services:
  # -------------------------------------
  # 1. FastAPI Backend
  # -------------------------------------
  - type: web
    name: rakshaquant-api
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run uvicorn scripts.dashboard_api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false

  # -------------------------------------
  # 2. React Frontend
  # -------------------------------------
  - type: web
    name: rakshaquant-dashboard
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: https://${rakshaquant-api.host}/api/dashboard
